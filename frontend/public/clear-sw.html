<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clear Service Worker</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            text-align: center;
        }
        .container {
            background: rgba(255, 255, 255, 0.1);
            padding: 3rem;
            border-radius: 1rem;
            backdrop-filter: blur(10px);
        }
        h1 { font-size: 2rem; margin-bottom: 1rem; }
        button {
            background: white;
            color: #667eea;
            border: none;
            padding: 1rem 2rem;
            border-radius: 0.5rem;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            margin: 0.5rem;
        }
        button:hover {
            background: #f0f0f0;
        }
        .status {
            margin-top: 1.5rem;
            padding: 1rem;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 0.5rem;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧹 Clear Service Worker</h1>
        <p>Click the button below to unregister service workers</p>
        
        <button onclick="clearServiceWorkers()">Clear Service Workers</button>
        <button onclick="clearCache()">Clear Cache</button>
        <button onclick="goToApp()">Go to App</button>
        
        <div class="status" id="status">
            Ready to clear...
        </div>
    </div>

    <script>
        const status = document.getElementById('status');

        async function clearServiceWorkers() {
            try {
                if ('serviceWorker' in navigator) {
                    const registrations = await navigator.serviceWorker.getRegistrations();
                    status.innerHTML = `Found ${registrations.length} service worker(s)...<br>`;
                    
                    for (let registration of registrations) {
                        await registration.unregister();
                        status.innerHTML += `✅ Unregistered service worker<br>`;
                    }
                    
                    if (registrations.length === 0) {
                        status.innerHTML = '✅ No service workers found!<br>';
                    }
                    
                    status.innerHTML += '<br><strong>Service workers cleared! Refresh the page.</strong>';
                } else {
                    status.innerHTML = 'Service workers not supported in this browser';
                }
            } catch (error) {
                status.innerHTML = `❌ Error: ${error.message}`;
            }
        }

        async function clearCache() {
            try {
                if ('caches' in window) {
                    const cacheNames = await caches.keys();
                    status.innerHTML = `Found ${cacheNames.length} cache(s)...<br>`;
                    
                    for (let cacheName of cacheNames) {
                        await caches.delete(cacheName);
                        status.innerHTML += `✅ Deleted cache: ${cacheName}<br>`;
                    }
                    
                    if (cacheNames.length === 0) {
                        status.innerHTML = '✅ No caches found!<br>';
                    }
                    
                    status.innerHTML += '<br><strong>Cache cleared! Refresh the page.</strong>';
                } else {
                    status.innerHTML = 'Cache API not supported';
                }
            } catch (error) {
                status.innerHTML = `❌ Error: ${error.message}`;
            }
        }

        function goToApp() {
            window.location.href = '/';
        }

        // Auto-check on load
        window.addEventListener('load', async () => {
            if ('serviceWorker' in navigator) {
                const registrations = await navigator.serviceWorker.getRegistrations();
                status.innerHTML = `Current service workers: ${registrations.length}`;
            }
        });
    </script>
</body>
</html>
